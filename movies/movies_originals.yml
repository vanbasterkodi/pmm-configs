templates:
  Networks:
    sort_title: +4_<<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7

collections:
  Apple TV+:
    template: {name: Networks}
    tmdb_network: 2552
    summary: A collection of Apple TV+ Original Content
