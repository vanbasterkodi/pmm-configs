templates:
  Networks:
    sort_title: +4_<<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7

collections:
  Apple TV+:
    template: {name: Networks}
    mdblist_list: https://mdblist.com/lists/k0meta/appletv-originals
    summary: A collection of Apple TV+ Original Content
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Networks/network_appletv.jpg

  Disney Plus Originals:
