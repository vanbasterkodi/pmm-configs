templates:
  TopRated:
    sort_title: +5_<<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7
    tmdb_discover:
      with_genres: <<genre_id>>
      sort_by: popularity.desc
      limit: 150
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Movies/movies_popular_<<genre_slug>>.jpg

##########################################
#              Popular                   #
##########################################
collections:
  Popular Action:
    template: { name: TopRated, genre_id: 28, genre_slug: action }

