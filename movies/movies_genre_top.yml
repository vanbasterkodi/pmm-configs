templates:
  TopRated:
    sort_title: +6<<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7
    tmdb_discover:
      with_genres: <<genre_id>>
      sort_by: vote_average.desc
      vote_count.gte: 100
      limit: 150
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Movies/movies_toprated_<<genre_slug>>.jpg

##########################################
#              Top Rated                 #
##########################################
collections:
  Top Rated Action:
