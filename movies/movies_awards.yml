######################################################
#                 Awards Collections                 #
######################################################
templates:
  Awards:
    sort_title: +3_<<num>><<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7

collections:
  Oscar Winners:
    template: {name: Awards, num: 6}
    imdb_search:
      type: movie
      event.winning: oscar
      sort_by: year.desc
      release.after: 2000-01-01
      limit: 100
      adult: false
    summary: A collection of Oscar Winners
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Movies/awards_oscarsawards.jpg

  Oscar Nominees:
    template: {name: Awards, num: 7}
    imdb_list: https://www.imdb.com/search/title/?groups=oscar_nominee&title_type=feature&sort=year,desc&count=100
    summary: A collection of Oscar Nominees
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Movies/awards_oscarsawards_nominated.jpg

  Emmy Award Winners:
    template: {name: Awards, num: 90}
    imdb_search:
      type: movie
      event.winning: emmy
      sort_by: year.desc
      limit: 100
      adult: false
    summary: A collection of Emmy Award Winners
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Awards/awards_emmy_winners.jpg

  Emmy Award Nominees:
    template: {name: Awards, num: 91}
    imdb_list: https://www.imdb.com/search/title/?groups=emmy_nominee&title_type=feature&sort=year,desc&count=100
    summary: A collection of Emmy Award Nominees
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Awards/awards_emmy_nominated.jpg
  
  Golden Globes Winners:
    template: {name: Awards, num: 92}
    imdb_search:
      type: movie
      event.winning: golden
      sort_by: year.desc
      limit: 100
      adult: false
    summary: A collection of Golden Globes Winners
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Awards/awards_goldenglobes.jpg

  Golden Globes Nominees:
    template: {name: Awards, num: 93}
    imdb_list: https://www.imdb.com/search/title/?groups=golden_globe_nominee&title_type=feature&sort=year,desc&count=100
    summary: A collection of Golden Globes Nominees
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Awards/awards_goldenglobes_nominated.jpg
  
