templates:
  TopRated:
    sort_title: +5_<<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7
    imdb_search:
      type: tv_series
      sort_by: popularity.desc       # fixed: was .asc on every collection
      genre: <<genre>>
      votes.gte: 30000
      adult: false
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Shows/tv_popular_<<genre_slug>>.jpg

##########################################
#              Popular                   #
##########################################
collections:
  Popular Action:
    template: { name: TopRated, genre: action, genre_slug: action }

