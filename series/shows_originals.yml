######################################################
#              Streaming Originals                   #
######################################################
templates:
  Originals:
    sort_title: +3_<<collection_name>>
    sync_mode: sync
    collection_mode: hide

collections:
  Amazon Prime:
    template: { name: Originals }
    smart_filter:
      sort_by: originally_available.desc
      validate: false
      any:
        network: Amazon Prime Video
        network: Prime Video
        network: Amazon
        network: Amazon Studios
    summary: A collection of Amazon content
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Networks/network_prime.jpg

  Apple TV+:
