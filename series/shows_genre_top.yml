templates:
  TopRated:
    sort_title: +6_<<collection_name>>
    sync_mode: sync
    collection_mode: hide
    collection_order: custom
    cache_builders: 7
    imdb_search:
      type: tv_series
      sort_by: rating.desc
      genre: <<genre>>
      votes.gte: 30000
      limit: 150
      adult: false
    url_poster: https://github.com/arkyntech/pmm-configs/raw/main/images/Shows/tv_toprated_<<genre_slug>>.jpg

##########################################
#              Top Rated                 #
##########################################
collections:
  Top Rated Action:
    template: { name: TopRated, genre: action, genre_slug: action }

